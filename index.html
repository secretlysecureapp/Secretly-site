<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Secretly | Private Messaging Without Phone Numbers or Email</title>
    <meta name="description" content="Secretly is a private messenger for people and teams who need secure communication without phone numbers, email, ads, or surveillance." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.secretlyapp.com/" />

    <!-- Theme + icons -->
    <meta name="theme-color" content="#060a12" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.secretlyapp.com/" />
    <meta property="og:title"       content="Secretly — Private Messaging Without Phone Numbers or Email" />
    <meta property="og:description" content="End-to-end encrypted chats, calls, and files. No phone number, no email, no surveillance. Available on Android, iOS, Windows, and macOS." />
    <meta property="og:image"        content="https://www.secretlyapp.com/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type"   content="image/jpeg" />
    <meta property="og:site_name"   content="Secretly" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@Secretly_App" />
    <meta name="twitter:title"       content="Secretly — Private Messaging Without Phone Numbers or Email" />
    <meta name="twitter:description" content="End-to-end encrypted chats, calls, and files. No phone number. No email. Zero-knowledge architecture." />
    <meta name="twitter:image"       content="https://www.secretlyapp.com/og-image.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- No-script fallback -->
    <noscript>
      <style>body { cursor: auto !important; }</style>
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
