<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Per-page <title>, description, canonical, og:url/title/description and
         twitter:title/description are injected per route by components/Seo.tsx
         (see src/seo.ts). Only shared/static tags live here. -->

    <!-- Theme + icons -->
    <meta name="theme-color" content="#060a12" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph (shared) -->
    <meta property="og:type"         content="website" />
    <meta property="og:image"        content="https://www.secretlyapp.com/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type"   content="image/jpeg" />
    <meta property="og:site_name"    content="Secretly" />
    <meta property="og:locale"       content="en_US" />

    <!-- Twitter Card (shared) -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@Secretly_App" />
    <meta name="twitter:image"       content="https://www.secretlyapp.com/og-image.jpg" />

    <!-- Fonts are self-hosted (see src/fonts.css) — no external requests. -->

    <!-- No-script fallback -->
    <noscript>
      <style>body { cursor: auto !important; }</style>
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
